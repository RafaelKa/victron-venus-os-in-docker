# Venus OS in Docker — Development / debugging setup.
#
# Usage:
#   docker compose -f docker-compose.development.yml up -d
#
# Includes:
#   - All ports exposed
#   - No auto-restart (for debugging)
#   - D-Bus socket can be shared with host
#
# SPDX-License-Identifier: GPL-3.0-or-later

services:
  venus-os:
    image: ghcr.io/rafaelka/venus-os:latest-raspberrypi5
    container_name: venus-os-dev
    privileged: true
    restart: "no"
    ports:
      - "80:80"         # Web GUI (HTTP)
      - "443:443"       # Web GUI (HTTPS)
      - "1883:1883"     # MQTT
      - "9001:9001"     # MQTT WebSocket
      - "2222:22"       # SSH
    volumes:
      - ./venus-os-data:/data
      # Share D-Bus socket with host for debugging
      # - /var/run/dbus:/var/run/dbus
    # Uncomment for device passthrough during development:
    # devices:
    #   - /dev/serial/by-id/usb-VictronEnergy_MK3-USB_Interface_HQ00000001-if00-port0:/dev/ttyUSBMK3
    environment:
      - VENUS_DISABLE_GUI=1
    networks:
      - venus-net

networks:
  venus-net:
    name: venus-net-dev
