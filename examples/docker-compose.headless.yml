# Venus OS in Docker — Headless mode (no GUI, web interface only).
#
# Usage:
#   docker compose -f docker-compose.headless.yml up -d
#
# Access the web GUI at http://<your-pi-ip>/
# MQTT available on port 1883.
#
# SPDX-License-Identifier: GPL-3.0-or-later

services:
  venus-os:
    image: ghcr.io/rafaelka/venus-os:latest-raspberrypi5
    container_name: venus-os
    privileged: true
    restart: unless-stopped
    ports:
      - "80:80"         # Web GUI
      - "443:443"       # Web GUI (HTTPS)
      - "1883:1883"     # MQTT
      - "9001:9001"     # MQTT WebSocket
      - "2222:22"       # SSH (mapped to avoid conflict with host)
    volumes:
      - venus-data:/data
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - VENUS_DISABLE_GUI=1
      - VENUS_ENABLE_HARDWARE=1

volumes:
  venus-data:
    name: venus-data
