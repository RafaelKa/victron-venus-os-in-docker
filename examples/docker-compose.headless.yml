# Venus OS in Docker — Headless mode (no GUI, web interface only).
#
# Usage:
#   docker compose -f docker-compose.headless.yml up -d
#
# Access the web GUI at http://<your-host-ip>/
# MQTT available on port 1883.
#
# SPDX-License-Identifier: GPL-3.0-or-later

services:
  venus-os:
    image: ghcr.io/rafaelka/venus-os:latest-raspberrypi5
    container_name: venus-os
    privileged: true
    restart: unless-stopped
    ports:
      - "80:80"         # Web GUI (HTTP)
      - "443:443"       # Web GUI (HTTPS)
      - "1883:1883"     # MQTT
      - "9001:9001"     # MQTT WebSocket
      - "2222:22"       # SSH (mapped to avoid conflict with host)
    volumes:
      - ./venus-os-data:/data
    # Uncomment and adjust for your Victron serial devices:
    # devices:
    #   - /dev/serial/by-id/usb-VictronEnergy_MK3-USB_Interface_HQ00000001-if00-port0:/dev/ttyUSBMK3
    environment:
      - VENUS_DISABLE_GUI=1
    networks:
      - venus-net

networks:
  venus-net:
    name: venus-net
