# Venus OS in Docker — Standard setup with hardware passthrough.
#
# Usage:
#   docker compose up -d
#
# For an interactive setup, use install.sh instead:
#   bash install.sh
#
# This configuration uses bridge networking, allowing multiple Venus OS
# instances on the same host with different port mappings.
#
# SPDX-License-Identifier: GPL-3.0-or-later

services:
  venus-os:
    image: ghcr.io/rafaelka/venus-os:latest-raspberrypi5
    container_name: venus-os
    privileged: true
    restart: unless-stopped
    ports:
      - "80:80"         # Web GUI (HTTP)
      - "443:443"       # Web GUI (HTTPS)
      - "1883:1883"     # MQTT
      - "9001:9001"     # MQTT WebSocket
      - "2222:22"       # SSH (mapped to avoid conflict with host)
    volumes:
      - ./venus-os-data:/data
    # Uncomment and adjust for your Victron serial devices.
    # Use /dev/serial/by-id/ paths on the host (stable across reboots).
    # The container path can be a friendly name of your choice.
    # devices:
    #   - /dev/serial/by-id/usb-VictronEnergy_MK3-USB_Interface_HQ00000001-if00-port0:/dev/ttyUSBMK3
    #   - /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_A10KXXXX-if00-port0:/dev/ttyUSBVEDirect
    environment:
      - VENUS_DISABLE_GUI=1
    networks:
      - venus-net

networks:
  venus-net:
    name: venus-net
